{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} Ahabanza {% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="{% static 'styles/style.css' %}">
</head>

<body class="bg-light">

    <!-- ✅ Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
        <button onclick="toggleDarkMode()" class="btn btn-dark ms-3">
            🌙 Dark
        </button>
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Employee System</a>

            <div>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="{% url 'home' %}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'all_workers' %}">Abakozi</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'add_worker' %}">Ongeramo</a>
                    </li>
                    <li class="nav-item">

                        <a class="nav-link" href="{% url 'admin:index' %}">Admin</a>



                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ✅ Main Content -->
    <div class="container mt-5">

        {% block content %}

        <div class="text-center">
            <h1 class="mb-4">Ahabanza</h1>

            <a href="{% url 'all_workers' %}" class="btn btn-primary me-2">
                Reba Abakozi
            </a>

            <a href="{% url 'add_worker' %}" class="btn btn-success">
                Ongeramo Umukozi
            </a>
        </div>

        {% endblock %}

    </div>

    <!-- Bootstrap JS (optional but good) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleDarkMode() {
            document.body.classList.toggle("dark-mode");

            // Save mode
            if (document.body.classList.contains("dark-mode")) {
                localStorage.setItem("theme", "dark");
            } else {
                localStorage.setItem("theme", "light");
            }
        }

        // Load saved mode
        window.onload = function () {
            if (localStorage.getItem("theme") === "dark") {
                document.body.classList.add("dark-mode");
            }
        };
    </script>
</body>

</html>
