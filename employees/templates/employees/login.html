{%load static%}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Injira</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="{% static 'styles/style.css' %}">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow"></nav>

    <div class="col-md-6 offset-md-3">
        <h1 class="mb-4">Kwinjira</h1>
        <form method="POST" class="shadow p-4 rounded bg-info">
            {% csrf_token %}

            <label class="form-label">Amazina</label>
            <input type="text" name="username" class="form-control" placeholder="Andika Amazina" required>
            <label class="form-label">Password</label>
            <input type="password" name="password" placeholder="Password" class="form-control" required><br><br>

            <button type="submit" class="btn btn-success">
                Injira
            </button>
    </div>

    </form>
    </div>
</body>

</html>
